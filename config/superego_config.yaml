simulation:
  population_size: 100
  rounds: 200
  random_seed: 42

  # Individual initialization ranges
  initial_wealth_range:
    min: 0
    max: 500
  initial_superego_range:
    min: 20
    max: 80

disaster:
  probability: 0.25
  redistribution: "equal_share"

sharing:
  rate: 0.01  # 1% of wealth
  mandatory_on_disaster: true

guilt:
  anxiety_increment: 0.05
  snowball_threshold: 0.5
  snowball_divisor: 1000
  baseline_decay_without_priests: 0.8
  baseline_decay_with_priests: 0.3

priests:
  activation:
    emergency_anxiety_threshold: 0.6
    emergency_superego_threshold: 25
    rich_temple_threshold: 200
    random_activation_chance: 0.3

  tiers:
    - max_wealth: 50
      reduction: 0.03
      cost_rate: 0.25
      boost_chance: 0.10
      boost_amount: 0.5
      corruption_chance: 0.05
      corruption_amount: 0.05

    - max_wealth: 100
      reduction: 0.06
      cost_rate: 0.20
      boost_chance: 0.12
      boost_amount: 0.7
      corruption_chance: 0.10
      corruption_amount: 0.08

    - max_wealth: 150
      reduction: 0.09
      cost_rate: 0.15
      boost_chance: 0.13
      boost_amount: 0.9
      corruption_chance: 0.15
      corruption_amount: 0.10

    - max_wealth: 200
      reduction: 0.12
      cost_rate: 0.12
      boost_chance: 0.14
      boost_amount: 1.1
      corruption_chance: 0.20
      corruption_amount: 0.12

    - max_wealth: null  # >200
      reduction: 0.15
      cost_rate: 0.08
      boost_chance: 0.15
      boost_amount: 1.3
      corruption_chance: 0.25
      corruption_amount: 0.15