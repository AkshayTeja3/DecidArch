simulation:
  name: "Superego Simulator"
  version: "2.0"
  random_seed: 42
  population_size: 100
  rounds: 200

individual:
  initial_wealth_range: [0, 500]
  initial_superego_range: [20, 80]
  initial_belief_about_others: 50.0
  initial_anxiety: 0.0

sharing:
  rate: 0.01  # 1% of wealth
  mandatory_on_disaster: true

disaster:
  probability: 0.25
  redistribution: "equal_share"

guilt:
  anxiety_increment: 0.05
  snowball_threshold: 0.5
  snowball_divisor: 1000
  baseline_decay_without_priests: 0.8
  baseline_decay_with_priests: 0.3

priests:
  activation:
    emergency_anxiety_threshold: 0.6
    emergency_superego_threshold: 25.0
    rich_temple_threshold: 200.0
    random_activation_chance: 0.3
    minimum_wealth: 50.0

  tiers:
    - name: "poor"
      max_wealth: 50
      anxiety_reduction: 0.03
      cost_rate: 0.25
      boost_chance: 0.10
      boost_amount: 0.5
      corruption_chance: 0.05
      corruption_amount: 0.05

    - name: "moderate"
      max_wealth: 100
      anxiety_reduction: 0.06
      cost_rate: 0.20
      boost_chance: 0.12
      boost_amount: 0.7
      corruption_chance: 0.10
      corruption_amount: 0.08

    - name: "comfortable"
      max_wealth: 150
      anxiety_reduction: 0.09
      cost_rate: 0.15
      boost_chance: 0.13
      boost_amount: 0.9
      corruption_chance: 0.15
      corruption_amount: 0.10

    - name: "wealthy"
      max_wealth: 200
      anxiety_reduction: 0.12
      cost_rate: 0.12
      boost_chance: 0.14
      boost_amount: 1.1
      corruption_chance: 0.20
      corruption_amount: 0.12

    - name: "rich"
      max_wealth: null  # >200
      anxiety_reduction: 0.15
      cost_rate: 0.08
      boost_chance: 0.15
      boost_amount: 1.3
      corruption_chance: 0.25
      corruption_amount: 0.15

metrics:
  track:
    - sharing_rate
    - avg_superego
    - avg_anxiety
    - avg_belief
    - temple_wealth
    - inequality
    - collapse_rate